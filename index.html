<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MOUT MINISTRY KU PORTAL</title>
    <style>
        /* --- BRANDING COLORS --- */
        :root {
            --primary: #1a2a6c;
            --gold: #f1c40f;
            --accent: #b21f1f;
            --white: #ffffff;
            --light-bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary), #b21f1f, #fdbb2d);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- THE BOX --- */
        .container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo-container img {
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid var(--primary);
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- VERSE BOX --- */
        .theme-container {
            background: #fff9e6;
            border-left: 5px solid var(--gold);
            padding: 15px;
            margin: 20px 0;
            font-style: italic;
            font-size: 0.9rem;
            color: #444;
            line-height: 1.4;
        }

        /* --- FORMS --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--primary);
        }

        /* Added Select to inputs styling */
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 5px rgba(241, 196, 15, 0.4);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row div {
            flex: 1;
        }

        /* --- BUTTONS --- */
        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #0d1a4d;
            transform: translateY(-1px);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .toggle-text button {
            background: none;
            border: none;
            color: var(--accent);
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- CHECKBOXES --- */
        .check-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #555;
        }

        .check-group input {
            width: auto;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .row { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="logo-container">
        <!-- Make sure the path to your image is correct -->
        <img src="\FREDDIE VS CODE\moutlogo.jpg" style="width: 100px; height: 100px; object-fit: cover;" alt="MOUT MINISTRY LOGO">
    </div>

    <h1>MOUT Ministry KU Portal</h1>

    <div class="theme-container">
        "Go therefore and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit."<br>
        <strong>— Matthew 28:19</strong>
    </div>

    <!-- LOGIN BOX -->
    <div id="loginBox">
        <form onsubmit="doLogin(event)">
            <label>Email Address</label>
            <input type="email" id="logEmail" placeholder="yourname@gmail.com" required>
            
            <label>4-Digit PIN</label>
            <input type="password" id="logPin" maxlength="4" pattern="\d{4}" placeholder="****" required>
            
            <div class="check-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember Me</label>
            </div>
            
            <button type="submit" class="btn-submit">SIGN IN</button>
        </form>
        <p class="toggle-text">New member? <button onclick="toggleForms()">Register here</button></p>
    </div>

    <!-- REGISTRATION BOX -->
    <div id="regBox" class="hidden">
        <form onsubmit="doRegister(event)">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Full Name" required>

            <div class="row">
                <div>
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="yourname@gmail.com" required>
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="07XXXXXXXX" required>
                </div>
            </div>

            <!-- YEAR OF STUDY SECTION -->
            <label>Year of Study</label>
            <select id="regYear" required>
                <option value="" disabled selected>Select your year...</option>
                <option value="1st Year">1ST YR</option>
                <option value="2nd Year">2ND YR</option>
                <option value="3rd Year">3RD YR</option>
                <option value="4th Year">4TH YR</option>
                <option value="5th Year">5TH YR</option>
                <option value="Associate">ASSOCIATE</option>
            </select>

            <div class="row">
                <div>
                    <label>Strong Password</label>
                    <input type="password" id="regPass" minlength="8" required>
                </div>
                <div>
                    <label>4-Digit Login PIN</label>
                    <input type="password" id="regPin" maxlength="4" pattern="\d{4}" placeholder="1234" required>
                </div>
            </div>

            <div class="check-group">
                <input type="checkbox" id="saveInfo">
                <label for="saveInfo">Save password and PIN on this device</label>
            </div>

            <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
        </form>
        <p class="toggle-text">Already registered? <button onclick="toggleForms()">Login here</button></p>
    </div>
</div>

<script>
    function toggleForms() {
        document.getElementById('loginBox').classList.toggle('hidden');
        document.getElementById('regBox').classList.toggle('hidden');
    }

    function doLogin(e) {
        e.preventDefault();
        const email = document.getElementById('logEmail').value;
        const pin = document.getElementById('logPin').value;

        if(email === "fredrickngigimatimu@gmail.com" && pin === "1234") {
            localStorage.setItem('username', "Fredrick Ngigi");
            localStorage.setItem('userEmail', email);
            window.location.href = "dashboard.html";
            return;
        }

        const namePart = email.split('@')[0];
        localStorage.setItem('username', namePart.charAt(0).toUpperCase() + namePart.slice(1));
        localStorage.setItem('userEmail', email);
        
        alert("Login Successful!");
        window.location.href = "dashboard.html";
    }

    function doRegister(e) {
        e.preventDefault();
        // You can capture the year value like this:
        const selectedYear = document.getElementById('regYear').value;
        console.log("Registered Year:", selectedYear);

        alert("Account created successfully! You can now login with your PIN.");
        toggleForms();
    }
</script>

</body>
</html>
